name: Pull Request

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: chmod +x scripts/*.sh && ./scripts/check_secrets.sh

  quality:
    name: Code quality
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Flutter analyze (zero tolerance)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Dependency vulnerability audit
        run: dart pub audit

      - name: Dart Code Metrics (optional)
        continue-on-error: true
        run: |
          if command -v dcm &>/dev/null; then
            dcm analyze lib --reporter=console
          else
            echo "DCM CLI not installed — skipping (see metrics.yaml)"
          fi

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - run: flutter pub get

      - name: Unit, bloc, widget & performance tests
        run: flutter test --coverage test/

      - name: Coverage threshold (90% lib/)
        run: bash scripts/check_coverage.sh 90 lib/

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: flutter test integration_test/
